<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <script src="https://kit.fontawesome.com/3f74b84e42.js" crossorigin="anonymous"></script>
    <title>Meme Generator</title>
</head>

<body onload="onInit()" class="main-layout">
    <header class="header-layout subgrid position-relative">
        <div class="logo"><img src="images/logo/aeae63780efb67018fae1f37db1aa4731bc681a9.png" alt=""></div>
        <nav class="main-nav hidden">
            <ul class="clean-list ">
                <li><button class="clean-btn">Memes</button></li>
                <li><button class="clean-btn selected">Gallery</button></li>
                <li><button class="clean-btn">About</button></li>
            </ul>
        </nav>
        <button class="open-nav-btn position-absolute"> <i class="fa-solid fa-align-justify"></i></button>
    </header>
    <main class="subgrid">
        <section class="memes hidden"></section>
        <section class="gallery">
            <fieldset class="gallery-search">
                <input class="clean-input" type="text" placeholder="search">
            </fieldset>
            <section class='gallery-container'></section>
        </section>
        <section class="editor hidden editor-layout">
            <button class="editor-back-btn" onclick="onOpenGallery()">
                <i class="fa-solid fa-chevron-left"></i>Back to gallery</button>

            <div onmousemove="onHighlightLine(event)" class="canvas-container">
                <canvas></canvas>
            </div>

            <aside class="editor-aside-layout position-relative">
                <button class="show-edit-panel-btn position-absolute shown-tablet"><i class="fa-solid fa-caret-left"></i></button>
                <section class="editor-tools editor-tools-layout">
                    <h2>Edit Text Line</h2>
                    <div class="editor-actions">
                        <button class="tool tools-add-line" onclick="onSwitchLine(event)"><i
                                class="fa-solid fa-up-down"></i></button>
                        <button class="tool tools-add-line" onclick="onAddLine(event)"><i
                                class="fa-regular fa-square-plus"></i></button>
                        <button class="tool tools-delete-line"><i class="fa-regular fa-trash-can"></i></button>
                    </div>
                    <fieldset class="line-editor">

                        <input class="tool line-text-edit" type="text" placeholder="This is the meme text ">

                        <div class="line-editor-options">
                            <select class="line-editor-font inactive" name="" id="">
                                <option value="Impact" selected>Impact</option>
                            </select>
                            <div class="line-editor-style">

                                <button class="tool line-style-btn clean-btn position-relative" onclick="onChangeFontSize(event,1)">
                                    a
                                    <i class="fa-solid fa-plus line-style-btn-dir"></i>
                                </button>
                                <button class="tool line-style-btn clean-btn position-relative" onclick="onChangeFontSize(event,-1)">
                                    a
                                    <i class=" fa-solid fa-minus  line-style-btn-dir"></i>
                                </button>
                                <button class="inactive tool line-style-btn clean-btn position-relative line-editor-text-align-btn.css"
                                    onclick="onChangeFontSize(event,-1)">
                                    <i class="fa-solid fa-align-left"></i>
                                </button>
                                <button class="inactive tool line-style-btn clean-btn position-relative line-editor-text-align-btn.css"
                                    onclick="onChangeFontSize(event,-1)">
                                    <i class="fa-solid fa-align-justify"></i>
                                </button>
                                <button class="inactive tool line-style-btn clean-btn position-relative line-editor-text-align-btn.css"
                                    onclick="onChangeFontSize(event,-1)">
                                    <i class="fa-solid fa-align-right"></i>
                                </button>
                                <button class="tool line-style-btn clean-btn position-relative" onclick="onChangeFontSize(event,-1)">
                                    a
                                    <i class="fa-solid fa-minus  line-style-btn-dir"></i>
                                </button>
    
                                <button class="tool line-style-btn clean-btn position-relative" onclick="onChangeFontSize(event,-1)">
                                    <i class="fa-solid fa-pencil"></i>
                                </button>
                            </div>
                        </div>

                    </fieldset>

                </section>
                <div class="export-buttons">
                    <a href="#" class="export-btn download-btn" onclick="onDownloadMeme(this,event)"
                        download="file-name">Download</a>
    
                </div>    
            </aside>

        </section>
    </main>
    <script src="js/services/memeService.js"></script>
    <script src="js/controllers/galleryController.js"></script>
    <script src="js/controllers/memeController.js"></script>
</body>

</html>
