<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <title>Meme Generator</title>
</head>

<body onload="onInit()">
    <header>
        <div class="icon">Meme Generator</div>
        <nav class="main-nav">
            <ul>
                <li><button>Memes</button></li>
                <li><button>Gallery</button></li>
                <li><button>About</button></li>
            </ul>
        </nav>
    </header>
    <main>
        <input class="main-search" type="text" placeholder="search">
        <section class="memes"></section>
        <section class="gallery">
        </section>
        <section class="editor hidden">
            <section class="editor-tools">
                <input class="line-text-edit" type="text" placeholder="This is the meme text ">
                <input type="color">
                <button class="tools-font-size-btn" onclick = "onChangeFontSize(event,1)">Increase Font</button>
                <button class="tools-font-size-btn" onclick = "onChangeFontSize(event,-1)">Decrease Font</button>
                <button class="tools-add-line" onclick = "onAddLine()">Add a line</button>
                <button class="tools-add-line" onclick = "onSwitchLine(event)">Switch a line</button>
                </select>
            </section>
            <div class="canvas-containter">
                <canvas></canvas>
            </div>
            <a href="#" onclick="onDownloadMeme(this)" download="file-name">Download</a>
            <div class="editor"></div>
        </section>
    </main>
    <script src="js/services/memeService.js"></script>
    <script src="js/controllers/galleryController.js"></script>
    <script src="js/controllers/memeController.js"></script>
</body>

</html>
